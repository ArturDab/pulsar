<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulsar</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='6' fill='%2300ff88'/%3E%3Ccircle cx='16' cy='16' r='11' stroke='%2300ff88' stroke-width='.8' fill='none' opacity='.4'/%3E%3Ccircle cx='16' cy='16' r='15' stroke='%2300d4ff' stroke-width='.5' fill='none' opacity='.2'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f13;--bg2:#14161c;--bg3:#1a1d25;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f1f5;--text2:rgba(255,255,255,.65);--dim:rgba(255,255,255,.38);--dimmer:rgba(255,255,255,.18);--neon:#00ff88;--neon-bg:rgba(0,255,136,.06);--neon-br:rgba(0,255,136,.2);--neon-glow:rgba(0,255,136,.15);--cyan:#00d4ff;--cyan-bg:rgba(0,212,255,.06);--cyan-br:rgba(0,212,255,.18);--hot:#ff3d3d;--warm:#ff8800;--mid:#ffcc00;--cool:#667788;--red:#ff4444;--red-dim:rgba(255,68,68,.35);--display:'Chakra Petch',sans-serif;--body:'DM Sans',system-ui,sans-serif;--radius:14px}
[data-theme="light"]{--bg:#f0f1f3;--bg2:#fff;--bg3:#f7f7f9;--surface:rgba(255,255,255,.8);--surface2:rgba(255,255,255,.95);--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);--text:#0c0c0f;--text2:#3a3a42;--dim:#6a6a74;--dimmer:#b0b0b8;--neon:#00995c;--neon-bg:rgba(0,153,92,.07);--neon-br:rgba(0,153,92,.2);--neon-glow:rgba(0,153,92,.12);--cyan:#0077aa;--cyan-bg:rgba(0,119,170,.06);--cyan-br:rgba(0,119,170,.18);--hot:#d92626;--warm:#cc6600;--mid:#b38f00;--cool:#778899;--red:#cc2222;--red-dim:rgba(204,34,34,.25)}
body{font-family:var(--body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.scanline{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.008) 2px,rgba(0,255,136,.008) 4px)}
[data-theme="light"] .scanline{background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,153,92,.004) 2px,rgba(0,153,92,.004) 4px)}
.glow-tl{position:fixed;top:-300px;left:-200px;width:800px;height:800px;background:radial-gradient(circle,rgba(0,255,136,.04),transparent 60%);pointer-events:none;z-index:0}
.glow-br{position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,255,.03),transparent 60%);pointer-events:none;z-index:0}
[data-theme="light"] .glow-tl{background:radial-gradient(circle,rgba(0,153,92,.04),transparent 60%)}
[data-theme="light"] .glow-br{background:radial-gradient(circle,rgba(0,119,170,.03),transparent 60%)}
.w{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 36px}
header{padding:18px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo-group{display:flex;align-items:center;gap:14px}
.logo-mark{position:relative;width:38px;height:38px}.logo-mark::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:var(--neon);opacity:.12;filter:blur(8px)}.logo-mark svg{position:relative;z-index:1}
.logo-text{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(135deg,var(--neon),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-pills{display:flex;gap:3px;margin-left:24px;padding-left:24px;border-left:1px solid var(--border)}
.nav-pill{font-family:var(--display);font-size:13px;font-weight:600;padding:8px 22px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;letter-spacing:.04em;text-transform:uppercase}.nav-pill:hover{color:var(--text2)}.nav-pill.on{background:var(--surface2);color:var(--neon);border-color:var(--neon-br)}
.hd-right{display:flex;align-items:center;gap:14px}
.clock{font-family:var(--display);font-size:13px;color:var(--dim);font-weight:500;letter-spacing:.05em}
.live{display:flex;align-items:center;gap:8px}.live-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);box-shadow:0 0 12px var(--neon-glow);animation:pulse 2s ease infinite}
/* === MICROINTERACTION ANIMATIONS === */
@keyframes pulse{0%,100%{box-shadow:0 0 12px var(--neon-glow)}50%{box-shadow:0 0 28px rgba(0,255,136,.45)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes ripple{0%{transform:scale(0);opacity:.4}100%{transform:scale(2.5);opacity:0}}
@keyframes checkDraw{from{stroke-dashoffset:24}to{stroke-dashoffset:0}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tempPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes errorShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes badgePop{0%{transform:scale(0) rotate(-12deg)}70%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 var(--neon-glow)}50%{box-shadow:0 0 0 4px transparent}}

/* Card entrance */
.card{animation:cardIn .28s cubic-bezier(.22,1,.36,1) both}
.grid .card:nth-child(1){animation-delay:.02s}
.grid .card:nth-child(2){animation-delay:.05s}
.grid .card:nth-child(3){animation-delay:.08s}
.grid .card:nth-child(4){animation-delay:.11s}
.grid .card:nth-child(5){animation-delay:.14s}
.grid .card:nth-child(6){animation-delay:.17s}

/* Card hover - lift with glow trail */
.card{transition:border-color .2s,transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s cubic-bezier(.4,0,.2,1)}
.card:hover{border-color:var(--border2);transform:translateY(-5px) scale(1.005);box-shadow:0 20px 60px rgba(0,0,0,.32),0 0 0 1px var(--border2)}
[data-theme="light"] .card:hover{box-shadow:0 14px 44px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.1)}
.card.st-prod:hover{box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 20px var(--neon-glow)}
.card.st-res:hover{box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 20px var(--cyan-bg)}

/* Card image zoom */
.c-img img{transition:transform .6s cubic-bezier(.4,0,.2,1)}
.card:hover .c-img img{transform:scale(1.07)}

/* Temperature ring - pop on mount */
.c-ring{animation:tempPop .4s cubic-bezier(.22,1,.36,1) both;animation-delay:.15s}
.c-temp{transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s}
.card:hover .c-temp{transform:scale(1.06);box-shadow:0 4px 16px rgba(0,0,0,.3)}

/* Button microinteractions */
.c-btn{transition:all .18s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.c-btn::after{content:'';position:absolute;inset:0;background:currentColor;opacity:0;border-radius:inherit;transform:scale(0);pointer-events:none}
.c-btn:active{transform:scale(.95)}
.c-btn:active::after{animation:ripple .4s ease-out}
.c-btn.gr:hover{background:rgba(0,255,136,.14);box-shadow:0 0 16px var(--neon-glow);transform:translateY(-1px)}
.c-btn.cy:hover{background:rgba(0,212,255,.14);box-shadow:0 0 14px var(--cyan-bg);transform:translateY(-1px)}

/* Dismiss button */
.c-dismiss{transition:all .2s cubic-bezier(.4,0,.2,1);transform:scale(.8);opacity:0}
.card:hover .c-dismiss{transform:scale(1);opacity:1}
.c-dismiss:hover{background:var(--hot)!important;color:#fff!important;transform:scale(1.15)!important;box-shadow:0 4px 12px rgba(255,61,61,.4)}
.c-dismiss:active{transform:scale(.9)!important}

/* Nav pills */
.nav-pill{transition:all .2s cubic-bezier(.4,0,.2,1);position:relative}
.nav-pill:hover{color:var(--text);transform:translateY(-1px)}
.nav-pill.on{animation:pop .25s cubic-bezier(.22,1,.36,1)}
.nav-pill:active{transform:scale(.95)}

/* Header buttons */
.theme-btn{transition:all .2s cubic-bezier(.4,0,.2,1)}
.theme-btn:hover{border-color:var(--neon-br);color:var(--neon);transform:rotate(15deg) scale(1.1);box-shadow:0 0 14px var(--neon-glow)}
.theme-btn:active{transform:rotate(15deg) scale(.92)}

/* Btn-run (Odśwież, Wyślij etc) */
.btn-run{transition:all .18s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.btn-run:hover{background:rgba(0,255,136,.14);box-shadow:0 0 18px var(--neon-glow);transform:translateY(-1px)}
.btn-run:active{transform:scale(.95) translateY(0)}

/* Toolbar tabs */
.ttab{transition:all .18s cubic-bezier(.4,0,.2,1)}
.ttab:hover{color:var(--text);transform:translateY(-1px)}
.ttab.on{animation:pop .22s cubic-bezier(.22,1,.36,1)}
.ttab:active{transform:scale(.94)}

/* Sort options */
.sort-opt{transition:all .18s cubic-bezier(.4,0,.2,1)}
.sort-opt:hover{color:var(--text2);transform:translateY(-1px)}
.sort-opt.on{animation:pop .22s cubic-bezier(.22,1,.36,1)}
.sort-opt:active{transform:scale(.93)}

/* Badge pop */
.c-badge{animation:badgePop .3s cubic-bezier(.22,1,.36,1) both;animation-delay:.2s}
.pc-pip{animation:badgePop .3s cubic-bezier(.22,1,.36,1)}

/* Status badge on card */
.card.st-prod .c-badge,
.card.st-res .c-badge{animation:badgePop .35s cubic-bezier(.22,1,.36,1) both}

/* Error shake */
.err.show{animation:slideDown .22s cubic-bezier(.22,1,.36,1),errorShake .4s .1s cubic-bezier(.36,.07,.19,.97) both}

/* Settings inputs */
.rv-input{transition:all .2s cubic-bezier(.4,0,.2,1)}
.rv-input:focus{transform:none;box-shadow:0 0 0 3px var(--neon-glow)}
.st-ta:focus{box-shadow:0 0 0 3px var(--neon-glow)}
.btn{transition:all .18s cubic-bezier(.4,0,.2,1)}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.btn:active{transform:scale(.95)}

/* Log rows fade in */
.log-row{animation:fadeIn .2s cubic-bezier(.22,1,.36,1) both}
.log-row:nth-child(1){animation-delay:.03s}
.log-row:nth-child(2){animation-delay:.06s}
.log-row:nth-child(3){animation-delay:.09s}
.log-row:nth-child(4){animation-delay:.12s}
.log-row:nth-child(5){animation-delay:.15s}

/* Day row slide in */
.day-row{animation:slideDown .25s cubic-bezier(.22,1,.36,1) both}

/* Felieton items */
.fel-item{transition:background .2s,padding .2s;border-radius:8px}
.fel-item:hover{background:var(--surface);padding-left:8px;padding-right:8px}
.fel-act{transition:all .18s cubic-bezier(.4,0,.2,1)}
.fel-act:hover{transform:scale(1.15)}
.fel-act:active{transform:scale(.88)}
.fel-act.go:hover{box-shadow:0 0 12px var(--neon-glow)}
.fel-act.rm:hover{box-shadow:0 0 10px rgba(255,68,68,.3)}

/* Feed toggle */
.cf-toggle-sl{transition:background .25s cubic-bezier(.4,0,.2,1)}
.cf-toggle-sl::before{transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.cf-toggle input:checked+.cf-toggle-sl::before{transform:translateX(16px) scale(1.1)}

/* More button */
.more-btn{transition:all .2s cubic-bezier(.4,0,.2,1)}
.more-btn:hover{background:var(--surface);color:var(--text);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.more-btn:active{transform:scale(.97)}

/* Rv-card */
.rv-card{transition:all .22s cubic-bezier(.4,0,.2,1)}
.rv-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}

/* Panel sections */
.st-block{transition:background .2s}
.st-block:hover{background:var(--surface)}

/* Logo pulse */
.logo-mark::before{transition:opacity .3s}
.logo-mark:hover::before{opacity:.22}
.logo-mark:hover svg{filter:drop-shadow(0 0 8px var(--neon))}

.live-label{font-family:var(--display);font-size:10px;font-weight:600;color:var(--neon);text-transform:uppercase;letter-spacing:.1em}
.theme-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.theme-btn:hover{border-color:var(--border2);color:var(--text)}
.cmd-strip{padding:14px 0;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.cmd-stats{display:flex;gap:4px;font-size:12px;font-weight:600}.cmd-stat{padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--dim);display:flex;align-items:center;gap:5px}.cmd-stat b{color:var(--text);font-weight:700}
.cmd-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.cmd-input{font-size:13px;padding:9px 16px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);outline:none;width:300px;font-family:var(--body);font-weight:500;transition:all .2s}.cmd-input:focus{border-color:var(--neon-br);background:var(--surface2)}.cmd-input::placeholder{color:var(--dimmer)}
.btn-run{font-family:var(--display);font-size:12px;font-weight:700;padding:9px 22px;border-radius:9px;border:1px solid var(--neon-br);background:var(--neon-bg);color:var(--neon);cursor:pointer;transition:all .15s;letter-spacing:.05em;text-transform:uppercase}.btn-run:hover{background:rgba(0,255,136,.12)}.btn-run:active{transform:scale(.97)}
.toolbar{display:flex;align-items:flex-end;justify-content:space-between;padding:30px 0 20px}.toolbar-left{display:flex;align-items:baseline;gap:14px}
.section-title{font-family:var(--display);font-size:34px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;line-height:1}.section-count{font-size:14px;color:var(--dim);font-weight:600}
.toolbar-tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px}
.ttab{font-size:12px;font-weight:700;padding:7px 14px;border-radius:6px;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;font-family:var(--body)}.ttab:hover{color:var(--text2)}.ttab.on{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
[data-theme="light"] .ttab.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sort-strip{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.sort-label{font-family:var(--display);font-size:11px;color:var(--dimmer);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-right:6px}
.sort-opt{font-size:12px;font-weight:600;padding:5px 14px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--dim);cursor:pointer;font-family:var(--body);transition:all .15s}.sort-opt.on{border-color:var(--border2);background:var(--surface2);color:var(--text)}
.day-row{display:flex;align-items:center;gap:14px;margin:40px 0 18px}
.day-label{font-family:var(--display);font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}.day-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}.day-count{font-size:11px;color:var(--dim);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}@media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.grid{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;display:flex;flex-direction:column;transition:all .3s cubic-bezier(.4,0,.2,1)}
[data-theme="light"] .card{background:#fff;border-color:rgba(0,0,0,.08);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.25)}[data-theme="light"] .card:hover{box-shadow:0 12px 40px rgba(0,0,0,.08)}
.card.st-res{border-color:var(--cyan-br)}.card.st-prod{border-color:var(--neon-br)}
[data-theme="light"] .card.st-res{border-color:rgba(0,119,170,.22);background:rgba(0,119,170,.03)}[data-theme="light"] .card.st-prod{border-color:rgba(0,153,92,.22);background:rgba(0,153,92,.03)}
.card.st-rej{opacity:.5;border-style:dashed}.card.st-taken{opacity:.5;border-style:dashed}.card.st-dim{opacity:.5;border-style:dashed}
.card.st-rej,.card.st-taken,.card.st-dim{pointer-events:none}
.c-overlay{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;pointer-events:none;background:rgba(13,15,19,.55);backdrop-filter:blur(2px)}
[data-theme="light"] .c-overlay{background:rgba(255,255,255,.6)}
.c-overlay-label{font-family:var(--display);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:10px 22px;border-radius:10px}
.c-overlay-label.rej{background:rgba(255,68,68,.9);color:#fff}
.c-overlay-label.taken{background:rgba(255,170,0,.9);color:#fff}
.c-overlay-label.dim{background:rgba(100,100,120,.85);color:#fff}
.c-overlay-reason{font-size:12px;color:rgba(255,255,255,.85);font-weight:600;max-width:250px;text-align:center;line-height:1.4;padding:4px 14px;background:rgba(0,0,0,.3);border-radius:6px}
.c-dismiss{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.6);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:all .2s;z-index:5;border:none;backdrop-filter:blur(6px)}.card:hover .c-dismiss{opacity:1}.c-dismiss:hover{background:var(--hot);color:#fff}.c-dismiss svg{width:14px;height:14px}
.c-img{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;background:var(--bg3)}
.c-img img{width:100%;height:100%;display:block;object-fit:cover;transition:transform .5s cubic-bezier(.4,0,.2,1)}.card:hover .c-img img{transform:scale(1.05)}
.c-noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dimmer);text-transform:uppercase;font-weight:600;letter-spacing:.06em}
.c-temp{position:absolute;top:12px;left:12px;z-index:2;display:flex;align-items:center;gap:8px;background:rgba(13,15,19,.88);backdrop-filter:blur(12px);border-radius:10px;padding:6px 14px 6px 8px;border:1px solid var(--border)}
[data-theme="light"] .c-temp{background:rgba(255,255,255,.92);border-color:rgba(0,0,0,.08)}
.c-ring{width:34px;height:34px;position:relative}.c-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:14px;font-weight:700}
.c-temp-label{font-family:var(--display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}.c-temp-sub{font-size:10px;font-weight:500;color:var(--dim)}
.c-body{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column}
.c-badge{font-family:var(--display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px}.c-badge svg{width:12px;height:12px}.c-badge.cy{background:var(--cyan-bg);color:var(--cyan);border:1px solid rgba(0,212,255,.12)}.c-badge.gr{background:var(--neon-bg);color:var(--neon);border:1px solid rgba(0,255,136,.12)}
.c-hl{font-size:20px;font-weight:700;line-height:1.3;color:var(--text);margin-bottom:8px;letter-spacing:-.02em}.c-hl a{color:inherit;text-decoration:none;transition:color .15s}.c-hl a:hover{color:var(--neon)}
.c-sum{font-size:14px;color:var(--text2);line-height:1.55;margin-bottom:auto;padding-bottom:14px}
.c-meta{font-size:12px;color:var(--dim);margin-bottom:14px;font-weight:600;display:flex;align-items:center;gap:6px}.c-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--dimmer)}

return'<div class="'+cls+'">'+ov+
(!isInactive?'<div class="c-dismiss" onclick="doAction('+item.id+',\'dismiss\')" title="Odrzuć">'+iX+'</div>':'')+
'<div class="c-img">'+(hasImg?'<img src="'+esc(item.og_image)+'" loading="lazy" onerror="this.outerHTML=\'<div class=c-noimg>no img</div>\'">':'<div class="c-noimg">no img</div>')+tempChip(t)+'</div>'+

function renderFree(){var el=document.getElementById('v-free');
var items=S.items.filter(function(i){return['free','reserved','produced','dismissed','rejected','slack_taken'].indexOf(i.status)>=0});
if(!items.length){setH(el,'<div class="empty">Brak newsów - kliknij "Odśwież"</div>');return}

// Cluster merge: group by cluster_id, pick best representative
var clusters={},unclustered=[];
items.forEach(function(i){
  var cid=i.cluster_id;
  if(!cid){unclustered.push(i);return}
  if(!clusters[cid])clusters[cid]=[];
  clusters[cid].push(i);
});
var merged=[];
Object.values(clusters).forEach(function(group){
  // Sort: active statuses first, then by temperature desc
  var wt={'free':0,'reserved':0,'produced':0,'dismissed':3,'rejected':4,'slack_taken':2};
  group.sort(function(a,b){return(wt[a.status]||0)-(wt[b.status]||0)||(b.temperature||0)-(a.temperature||0)});
  var best=Object.assign({},group[0]);
  best._sources=group.length;
  best._allUrls=group.map(function(g){return g.url});
  // If ANY item in cluster is slack_taken → whole cluster is taken
  var takenItem=group.find(function(g){return g.status==='slack_taken'});
  if(takenItem&&best.status==='free'){
    best.status='slack_taken';
    best.reserved_by=takenItem.reserved_by;
  }
  // If ANY item in cluster is reserved/produced by me → keep that status
  var myItem=group.find(function(g){return g.status==='reserved'||g.status==='produced'});
  if(myItem){best.status=myItem.status;best.id=myItem.id;best.produce_count=myItem.produce_count}
  merged.push(best);
});
unclustered.forEach(function(i){i._sources=1;merged.push(i)});
items=merged;

var pinW=S.pinTop?{'reserved':-2,'produced':-1}:{};var sortFn=S.sort==='temp'?function(a,b){var wa=Object.assign({'free':0,'dismissed':3,'rejected':4,'slack_taken':4},pinW);return(wa[a.status]||0)-(wa[b.status]||0)||(b.temperature||0)-(a.temperature||0)}:function(a,b){var wa=Object.assign({'free':0,'dismissed':3,'rejected':4,'slack_taken':4},pinW);return(wa[a.status]||0)-(wa[b.status]||0)||new Date(b.published_at)-new Date(a.published_at)};
var days={};items.forEach(function(i){var k=dayK(i.published_at);if(!days[k])days[k]={label:dayLbl(i.published_at),age:dayAge(i.published_at),items:[]};days[k].items.push(i)});
Object.values(days).forEach(function(d){d.items.sort(sortFn)});
var de=Object.entries(days).sort(function(a,b){return a[1].age-b[1].age});

var h='<div class="sort-strip"><span class="sort-label">Sortuj</span><button class="sort-opt'+(S.sort==='temp'?' on':'')+'" onclick="S.sort=\'temp\';localStorage.setItem(\'pulsar-sort\',\'temp\');renderFree()">Potencjał</button><button class="sort-opt'+(S.sort==='time'?' on':'')+'" onclick="S.sort=\'time\';localStorage.setItem(\'pulsar-sort\',\'time\');renderFree()">Czas</button>'+pinChk+'</div>';
var freeCount=items.filter(function(i){return i.status==='free'}).length;
document.getElementById('secCount').textContent=freeCount+' newsów';
vis.forEach(function(e){var g=e[1];h+='<div class="day-row"><div class="day-label">'+esc(g.label)+'</div><div class="day-line"></div><div class="day-count">'+g.items.length+' newsów</div></div><div class="grid">'+g.items.map(function(i){return newsCard(i)}).join('')+'</div>'});

async function saveFelDays(){var v=document.getElementById('felDaysRange').value,b=document.getElementById('felDaysBtn');b.textContent='...';b.disabled=true;await fetch('/api/settings/felieton_search_days',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:v})});b.textContent='Zapisz';b.disabled=false;}
async function saveWebhook(key,inId,btnId,stId){var v=document.getElementById(inId).value.trim(),b=document.getElementById(btnId),st=document.getElementById(stId);if(!v)return;b.textContent='...';b.disabled=true;await fetch('/api/settings/'+key,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:v})});b.textContent='Zapisz';b.disabled=false;if(st){st.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--neon)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';st.style.opacity='1';setTimeout(function(){st.style.opacity='0'},3000)}}
async function refilter(){var b=document.getElementById('refilterBtn');b.textContent='...';b.disabled=true;await fetch('/api/pipeline/refilter',{method:'POST'});var p=setInterval(async function(){try{var s=await fetch('/api/pipeline/status').then(function(r){return r.json()});if(!s.isRefiltering){clearInterval(p);await load();b.textContent='Przefiltruj';b.disabled=false}}catch(e){}},3e3)}

var bodyHtml='';
if(S.settingsTab==='newsy'){
  var modelsBlock=['<div class="st-block"><div class="st-lbl">Modele AI</div>',
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px">',

    '<div><div style="font-size:12px;font-weight:600;color:var(--dim);margin-bottom:4px">OCENA TEMPERATURY</div><div id="mdlTempWrap">',sel('mdlTemp'),'</div></div>',

  var routerBlock='<div class="st-block"><div class="st-lbl">Router instructions</div><div class="st-hint">Zasady filtrowania i grupowania newsów</div><textarea class="st-ta" id="routerTa" style="min-height:200px"></textarea><div style="margin-top:10px"><button class="btn" id="saveRBtn" onclick="saveSetting(&#39;router_instructions&#39;,&#39;routerTa&#39;,&#39;saveRBtn&#39;)">Zapisz</button></div></div>';
  var tempBlock='<div class="st-block"><div class="st-lbl">Temperature instructions</div><div class="st-hint">Instrukcje dla modelu oceniającego potencjał (1-10)</div><textarea class="st-ta" id="tempTa" style="min-height:160px"></textarea><div style="margin-top:10px"><button class="btn" id="saveTBtn" onclick="saveSetting(&#39;temperature_instructions&#39;,&#39;tempTa&#39;,&#39;saveTBtn&#39;)">Zapisz</button></div></div>';
  var refilterBlock='<div class="st-block" style="display:flex;align-items:center;gap:14px"><button class="btn-run" id="refilterBtn" onclick="refilter()">Przefiltruj</button><span style="font-size:13px;color:var(--dim)">Ponownie ocenia temperaturę newsów z ostatnich 3 dni</span></div>';
  var clearBlock='<div class="st-block" style="border-top:1px solid var(--red-dim)"><div class="st-lbl" style="color:var(--red)">Strefa niebezpieczna</div><div class="st-hint">Usuwa wszystkie wolne, odrzucone i zdismissowane newsy z bazy. Zarezerwowane i w produkcji zostają. Operacja nieodwracalna.</div><div style="margin-top:10px"><button class="btn" id="clearBtn" onclick="doClear()" style="border-color:var(--red-dim);color:var(--red)">Wyczyść bazę newsów</button></div></div>';

  var felInstBlock='<div class="st-block"><div class="st-lbl">Felieton instructions</div><div class="st-hint">Instrukcje dla generatora pomysłów na felietony</div><textarea class="st-ta" id="felTa" style="min-height:200px"></textarea><div style="margin-top:10px"><button class="btn" id="saveFBtn" onclick="saveSetting(&#39;felieton_instructions&#39;,&#39;felTa&#39;,&#39;saveFBtn&#39;)">Zapisz</button></div></div>';

var tabN={free:'Newsy',taken:'Wzięte',kanal:'Slack',feeds:'Feedy'};
function setTab(t){S.tab=t;S.allDays=false;['free','taken','kanal','feeds'].forEach(function(x){document.getElementById('v-'+x).style.display=x===t?'':'none';document.getElementById('tab-'+x).classList.toggle('on',x===t)});document.getElementById('secTitle').textContent=tabN[t];if(t==='taken')renderTaken();else if(t==='feeds')renderFeeds();else if(t==='kanal')loadKanal();else renderFree()}

async function loadReviews(){try{S.reviews=await fetch('/api/reviews').then(function(r){return r.json()});renderReviews()}catch(e){console.error(e)}}
function renderReviews(){var el=document.getElementById('rvList');if(!S.reviews.length){el.innerHTML='<div class="empty">Brak recenzji. Utwórz pierwszą.</div>';return}
el.innerHTML='<div class="rv-list">'+S.reviews.map(function(r){var ip=r.status==='produced',pc=r.produce_count||0;return'<div class="rv-card'+(ip?' produced':'')+'"><div class="rv-title">'+esc(r.game_title)+'</div>'+(r.links&&r.links.length?'<div class="rv-links">'+r.links.map(function(l){return'<a href="'+esc(l)+'" target="_blank">'+esc(l)+'</a>'}).join('')+'</div>':'')+(r.notes?'<div class="rv-notes">'+esc(r.notes)+'</div>':'')+'<div class="rv-meta">'+fmtD(r.created_at)+(pc?' \u00b7 wysłano '+pc+'x':'')+'</div><div class="rv-acts"><div class="c-btn gr" style="max-width:200px" onclick="produceReview('+r.id+')">'+iRocket+' Produkcja'+(pc?'<span class="pc-pip">'+pc+'</span>':'')+'</div><div class="c-btn cy" style="max-width:100px;border-color:var(--red-dim);color:var(--red)" onclick="deleteReview('+r.id+')">'+iX+' Usuń</div></div></div>'}).join('')+'</div>'}
function addRvLink(){var c=document.getElementById('rvLinks'),row=document.createElement('div');row.className='rv-link-row';row.innerHTML='<input class="rv-input" style="margin:0" placeholder="https://..." onkeydown="if(event.key===\'Enter\'){event.preventDefault();addRvLink()}"><button class="rv-link-rm" onclick="this.parentNode.remove()">\u00d7</button>';c.appendChild(row);row.querySelector('input').focus()}
async function createReview(){var title=document.getElementById('rvTitle').value.trim();if(!title){showErr('Podaj tytuł gry');return}var inputs=document.querySelectorAll('#rvLinks input'),links=[].map.call(inputs,function(i){return i.value.trim()}).filter(Boolean),notes=document.getElementById('rvNotes').value.trim();try{var r=await fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_title:title,links:links,notes:notes})});if(!r.ok){var d=await r.json();throw new Error(d.error)}document.getElementById('rvTitle').value='';document.getElementById('rvNotes').value='';document.getElementById('rvLinks').innerHTML='<div class="rv-link-row"><input class="rv-input" style="margin:0" placeholder="https://... (link do recenzji źródłowej)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addRvLink()}"></div>';await loadReviews()}catch(e){showErr(e.message)}}
async function produceReview(id){try{var r=await fetch('/api/reviews/'+id+'/produce',{method:'POST'});if(!r.ok){var d=await r.json();throw new Error(d.error)}await loadReviews()}catch(e){showErr(e.message)}}
async function deleteReview(id){if(!confirm('Usunąć recenzję?'))return;try{await fetch('/api/reviews/'+id,{method:'DELETE'});await loadReviews()}catch(e){showErr(e.message)}}

async function loadFelietony(){try{S.felietony=await fetch('/api/felietony').then(function(r){return r.json()});renderFelietony()}catch(e){console.error(e)}}

var iSend='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
var iTrash='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

function renderFelietony(){var el=document.getElementById('felList');
if(!S.felietony.length){el.innerHTML='<div class="empty">Brak pomysłów. Kliknij "Generuj 10 pomysłów".</div>';return}
el.innerHTML='<div class="fel-list">'+S.felietony.map(function(f){
var isSent=f.status==='sent',pc=f.produce_count||0;
return'<div class="fel-item'+(isSent?' sent':'')+'">'+
'<div class="fel-body">'+
'<input class="fel-title-input" value="'+esc(f.title).replace(/"/g,'&quot;')+'" onchange="updateFel('+f.id+',this.value,null)">'+
'<textarea class="fel-brief-input" onchange="updateFel('+f.id+',null,this.value)" rows="3">'+esc(f.brief)+'</textarea>'+
(pc?'<div class="fel-row-meta">wysłano '+pc+'x</div>':'')+
'</div>'+
'<div class="fel-row-acts">'+
'<button class="fel-act go" onclick="produceFel('+f.id+')" title="Wyślij do produkcji">'+iSend+'</button>'+
'<button class="fel-act rm" onclick="deleteFel('+f.id+')" title="Usuń">'+iTrash+'</button>'+
'</div></div>'}).join('')+'</div>'}

async function generateFelietony(){
var b=document.getElementById('felGenBtn'),st=document.getElementById('felGenStatus');
var dir=document.getElementById('felDir').value.trim();
var cur=document.getElementById('felCurrent').checked;
b.disabled=true;b.textContent='Generuję...';st.textContent='';
try{var r=await fetch('/api/felietony/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({direction:dir,current_events:cur})});
var d=await r.json();if(!r.ok)throw new Error(d.error);
st.textContent='Wygenerowano '+d.length+' pomysłów';document.getElementById('felDir').value='';
await loadFelietony()}catch(e){st.textContent='Błąd: '+e.message}
b.disabled=false;b.textContent='Generuj 10 pomysłów'}

async function updateFel(id,title,brief){
var body={};if(title!==null)body.title=title;if(brief!==null)body.brief=brief;
try{await fetch('/api/felietony/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})}catch(e){console.error(e)}}

async function produceFel(id){try{var r=await fetch('/api/felietony/'+id+'/produce',{method:'POST'});if(!r.ok){var d=await r.json();throw new Error(d.error)}await loadFelietony()}catch(e){showErr(e.message)}}

async function deleteFel(id){try{await fetch('/api/felietony/'+id,{method:'DELETE'});await loadFelietony()}catch(e){showErr(e.message)}}

setInterval(function(){var h=new Date().getHours();if(S.module==='news'&&h>=6&&h<24)load()},36e5);load()
</script>
