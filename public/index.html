<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulsar · news monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--surface:#fff;--border:#e2e4e9;--border2:#ccc;--text:#111;--muted:#555;--dim:#999;--green:#00c9a7;--blue:#0070f3;--red:#ee0000;--orange:#f97316;--amber:#e5a000;--slate:#94a3b8;--reserved:#e8faf4}
body{font-family:'Geist',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.m{font-family:'Geist Mono',monospace}

.hd{border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
.hd-in{max-width:1100px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.hd-logo{display:flex;align-items:center;gap:10px}
.hd-logo b{font-size:17px;font-weight:800;letter-spacing:-.03em}
.hd-nav{display:flex;gap:4px;margin-left:12px;padding-left:12px;border-left:1px solid var(--border)}
.hd-tab{font-size:13px;font-weight:600;padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .12s;font-family:'Geist',sans-serif}
.hd-tab:hover{color:var(--text);background:var(--bg)}
.hd-tab.on{color:var(--text);background:var(--bg)}
.hd-logo span{font-size:14px;color:var(--dim)}

.bar{max-width:1100px;margin:0 auto;padding:10px 24px;display:flex;gap:8px;align-items:center;font-size:13px;color:var(--dim);flex-wrap:wrap}
.bdot{width:7px;height:7px;border-radius:50%}
.bdot.ok{background:var(--green);box-shadow:0 0 6px rgba(0,201,167,.4)}
.bdot.busy{background:var(--amber);animation:p 1.4s ease infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}
.bsep{color:#ddd;margin:0 3px}
.bstat b{color:var(--text);font-weight:700}
.bactions{margin-left:auto;display:flex;gap:6px}
.btn{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:6px 16px;border-radius:6px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .15s}
.btn:hover{border-color:var(--border2);color:var(--text)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-p{background:var(--text);color:#fff;border-color:var(--text)}
.btn-p:hover{background:#333}

.main{max-width:1100px;margin:0 auto;padding:16px 24px 80px}

.send{display:flex;gap:8px;align-items:center;margin-bottom:20px;padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface)}
.send .lbl{font-size:13px;color:var(--dim);white-space:nowrap}
.send input{flex:1;font-family:'Geist Mono',monospace;font-size:14px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;outline:none;color:var(--text)}
.send input:focus{border-color:var(--border2);background:var(--surface)}

.tabs{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tabs-t{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.tabs-r{display:flex;gap:5px}
.tab{font-size:13px;color:var(--muted);background:transparent;border:1px solid var(--border);padding:6px 16px;border-radius:6px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .15s}
.tab:hover{color:var(--text);border-color:var(--border2)}
.tab.on{background:var(--text);color:#fff;border-color:var(--text)}

/* Day headers */
.day{margin:32px 0 16px;font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.day:first-child{margin-top:8px}

/* Sort bar */
.sort-bar{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.sort-bar span{font-size:12px;color:var(--dim)}
.sort-btn{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--muted);cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .12s}
.sort-btn:hover{border-color:var(--border2);color:var(--text)}
.sort-btn.on{background:var(--text);color:#fff;border-color:var(--text)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.grid{grid-template-columns:1fr}}

/* Card */
.card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:18px;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--border2);transform:translateY(-2px)}
.card.reserved{border-color:var(--green);background:var(--reserved)}
.card.faded{opacity:.3;pointer-events:none}
.card-img{width:100%;height:160px;background:#ecedf0;overflow:hidden;position:relative;border-radius:10px 10px 0 0}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-gauge{position:absolute;top:8px;right:8px;background:#fff;border-radius:8px;padding:2px 4px 0;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card-body{padding:16px 18px;flex:1;display:flex;flex-direction:column}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-src{font-size:12px;color:var(--dim);font-weight:500}
.card-reserved-badge{font-size:11px;color:#2563eb;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.card-produced-badge{font-size:11px;color:#16a34a;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.card-hl{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:8px;letter-spacing:-.02em}
.card-hl a{color:var(--text);text-decoration:none}
.card-hl a:hover{text-decoration:underline}
.card-sum{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:10px;flex:1}
.card-meta{font-size:12px;color:var(--dim);margin-bottom:14px}
.card-slack{font-size:12px;color:var(--red);margin-bottom:10px;font-weight:500}
.card-actions{display:flex;gap:8px}
.card-btn{flex:1;padding:9px 0;border-radius:8px;border:2px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:'Geist',sans-serif;transition:all .12s;background:var(--surface);color:var(--muted)}
.card-btn:hover{transform:translateY(-1px)}
.card-btn:disabled{opacity:.3;cursor:not-allowed}
.card-btn.act-dismiss{border-color:#fca5a5;color:#dc2626;background:#fef2f2}
.card-btn.act-dismiss:hover{background:#fee2e2}
.card-btn.act-res{border-color:#93c5fd;color:#2563eb;background:#eff6ff}
.card-btn.act-res:hover{background:#dbeafe}
.card-btn.act-prod{border-color:#86efac;color:#16a34a;background:#f0fdf4}
.card-btn.act-prod:hover{background:#dcfce7}
.card.dismissed{opacity:.25;filter:grayscale(1);pointer-events:none;order:999}
.card.reserved{border-color:#60a5fa;background:#eff6ff}
.card.produced{border-color:#4ade80;background:#f0fdf4}

/* Rejected */
.rej-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:10px}
.rej-title{font-size:16px;font-weight:700;margin-bottom:6px}
.rej-reason{font-size:14px;color:var(--red);margin-bottom:8px;font-style:italic}
.rej-sum{font-size:14px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.rej-meta{font-size:12px;color:var(--dim);margin-bottom:10px}

/* Slack */
.sl-msg{display:flex;gap:12px;padding:14px 18px;border-top:1px solid var(--border)}
.sl-msg:first-child{border-top:none}
.sl-av{width:32px;height:32px;border-radius:50%;background:#f0f0ee;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0}
.sl-body{flex:1}
.sl-head{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.sl-name{font-size:14px;font-weight:600}
.sl-time{font-size:12px;color:var(--dim)}
.sl-text{font-size:14px;color:var(--muted);line-height:1.5;word-break:break-word}
.sl-text a{color:var(--blue);text-decoration:none}

/* Feeds */
.fd-row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-top:1px solid var(--border)}
.fd-form{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border)}
.fd-in{flex:1;font-size:14px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);outline:none;font-family:'Geist Mono',monospace}

/* Settings */
.st-block{padding:20px;border-top:1px solid var(--border)}
.st-block:first-child{border-top:none}
.st-lbl{font-size:14px;font-weight:600;margin-bottom:6px}
.st-hint{font-size:13px;color:var(--dim);margin-bottom:10px}
.st-ta{width:100%;font-size:13px;line-height:1.7;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;resize:vertical;outline:none;font-family:'Geist Mono',monospace}

/* Util */
.panel{border:1px solid var(--border);border-radius:10px;background:var(--surface);overflow:hidden}
.empty{text-align:center;padding:48px 24px;color:var(--dim);font-size:14px}
.err{display:none;align-items:center;gap:8px;padding:12px 16px;margin-bottom:14px;border:1px solid #fdd;border-radius:8px;background:#fff5f5;color:var(--red);font-size:13px}
.err.show{display:flex}
.more-btn{display:block;width:100%;padding:14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);font-size:14px;cursor:pointer;text-align:center;margin:14px 0;font-weight:500}
.more-btn:hover{border-color:var(--border2);color:var(--text)}
.cf-toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.cf-toggle input{opacity:0;width:0;height:0}
.cf-toggle-sl{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:10px;transition:.2s}
.cf-toggle-sl::before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.cf-toggle input:checked+.cf-toggle-sl{background:var(--green)}
.cf-toggle input:checked+.cf-toggle-sl::before{transform:translateX(16px)}
/* Reviews module */
.rv-grid{display:grid;grid-template-columns:1fr 320px;gap:20px}
@media(max-width:800px){.rv-grid{grid-template-columns:1fr}}
.rv-form{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.rv-form h3{font-size:18px;font-weight:700;margin-bottom:14px}
.rv-input{width:100%;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);outline:none;margin-bottom:10px;font-family:'Geist',sans-serif}
.rv-input:focus{border-color:var(--border2);background:var(--surface)}
.rv-links{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.rv-link-row{display:flex;gap:6px;align-items:center}
.rv-link-row input{flex:1}
.rv-link-rm{width:32px;height:32px;border:1px solid #fdd;border-radius:6px;background:#fff;color:var(--red);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.rv-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;transition:border-color .12s}
.rv-card.produced{border-color:#4ade80;background:#f0fdf4}
.rv-card-title{font-size:17px;font-weight:700;margin-bottom:6px}
.rv-card-links{font-size:12px;color:var(--dim);margin-bottom:8px}
.rv-card-links a{color:var(--blue);text-decoration:none;display:block;margin-bottom:2px}
.rv-card-links a:hover{text-decoration:underline}
.rv-card-notes{font-size:13px;color:var(--muted);margin-bottom:10px;font-style:italic}
.rv-card-meta{font-size:11px;color:var(--dim);margin-bottom:10px}
.rv-card-actions{display:flex;gap:8px}
.mc-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.mc-panel h3{font-size:15px;font-weight:700;margin-bottom:12px}
.mc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.mc-item:last-child{border-bottom:none}
.mc-score{width:36px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.mc-score.green{background:#6c3}
.mc-score.yellow{background:#fc3;color:#333}
.mc-score.red{background:#f00}
.mc-score.tbd{background:#ccc;font-size:10px}
.mc-title{font-size:13px;font-weight:600;flex:1}
.mc-title a{color:var(--text);text-decoration:none}
.mc-title a:hover{text-decoration:underline}
.mc-date{font-size:11px;color:var(--dim)}

footer{border-top:1px solid var(--border);background:var(--surface)}
footer .in{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;font-size:12px;color:var(--dim)}
</style>
</head>
<body>
<header class="hd"><div class="hd-in">
  <div class="hd-logo">
    <svg width="24" height="24" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3" fill="#111"/><circle cx="10" cy="10" r="6.5" stroke="#111" stroke-width="1" fill="none" opacity=".3"/><circle cx="10" cy="10" r="9.5" stroke="#111" stroke-width="1" fill="none" opacity=".15"/></svg>
    <b>Pulsar</b>
    <div class="hd-nav">
      <button class="hd-tab on" id="mod-news" onclick="setModule('news')">Newsy</button>
      <button class="hd-tab" id="mod-reviews" onclick="setModule('reviews')">Recenzje</button>
    </div>
  </div>
  <div class="m" style="font-size:13px;color:var(--dim)"><span id="hTime">--:--</span> · <span id="hDate">--.--.--</span></div>
</div></header>

<div id="newsModule">
<div class="bar m">
  <span class="bdot ok" id="sDot"></span>
  <span id="sTxt">gotowy</span>
  <span class="bsep">|</span>
  <span class="bstat"><b id="mFree">-</b> wolnych</span>
  <span class="bsep">·</span>
  <span class="bstat"><b id="mRes">-</b> zarezerwowanych</span>
  <span class="bsep">·</span>
  <span class="bstat"><b id="mProd">-</b> w produkcji</span>
  <span class="bsep">·</span>
  <span class="bstat"><b id="mFeeds">-</b> feedów</span>
  <span class="bsep">|</span>
  <span id="sRun">run: —</span>
  <div class="bactions">
    <button class="btn" id="refreshBtn" onclick="doRefresh()">odśwież</button>
    <button class="btn btn-p" id="runBtn" onclick="doRun()">pobierz nowe</button>
  </div>
</div>

<main class="main">
  <div class="err" id="errEl"><span id="errMsg"></span></div>
  <div class="send">
    <span class="lbl">wyślij do produkcji →</span>
    <input id="sendUrl" type="url" placeholder="https://..." onkeydown="if(event.key==='Enter')doSend()">
    <button class="btn btn-p" id="sendBtn" onclick="doSend()">Wyślij</button>
    <span class="m" style="font-size:12px" id="sendSt"></span>
  </div>
  <div class="tabs">
    <span class="tabs-t" id="secT">Wolne newsy</span>
    <div class="tabs-r">
      <button class="tab on" id="tab-free" onclick="setTab('free')">wolne</button>
      <button class="tab" id="tab-taken" onclick="setTab('taken')">wzięte</button>
      <button class="tab" id="tab-rejected" onclick="setTab('rejected')">odrzucone</button>
      <button class="tab" id="tab-kanal" onclick="setTab('kanal')">kanał</button>
      <button class="tab" id="tab-feeds" onclick="setTab('feeds')">feedy</button>
      <button class="tab" id="tab-settings" onclick="setTab('settings')">ustawienia</button>
    </div>
  </div>
  <div id="v-free"></div>
  <div id="v-taken" style="display:none"></div>
  <div id="v-rejected" style="display:none"></div>
  <div id="v-kanal" style="display:none"></div>
  <div id="v-feeds" style="display:none"></div>
  <div id="v-settings" style="display:none"></div>
</main>
</div><!-- /newsModule -->

<div id="reviewsModule" style="display:none">
<main class="main">
  <div class="err" id="rvErr"><span id="rvErrMsg"></span></div>

  <div class="rv-form">
    <h3>Nowa recenzja</h3>
    <input class="rv-input" id="rvTitle" placeholder="Tytuł gry, np. Resident Evil Requiem">
    <div class="rv-links" id="rvLinks">
      <div class="rv-link-row">
        <input class="rv-input" style="margin:0" placeholder="https://... (link do recenzji źródłowej)" onkeydown="if(event.key==='Enter'){event.preventDefault();addRvLink()}">
      </div>
    </div>
    <button class="btn" onclick="addRvLink()" style="margin-bottom:10px">+ dodaj link</button>
    <textarea class="rv-input" id="rvNotes" placeholder="Notatki (opcjonalnie) - dodatkowe wskazówki dla AI" rows="2" style="resize:vertical"></textarea>
    <button class="btn btn-p" onclick="createReview()">Utwórz recenzję</button>
  </div>

  <div class="rv-grid">
    <div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:16px">Recenzje</div>
      <div id="rvList"></div>
    </div>
    <div>
      <div class="mc-panel">
        <h3>Najnowsze recenzje w sieci</h3>
        <div id="mcList"><div style="color:var(--dim);font-size:13px;padding:12px 0">Ładowanie...</div></div>
      </div>
    </div>
  </div>
</main>
</div><!-- /reviewsModule -->

<footer><div class="in m"><span>pulsar</span><span>v5.0</span></div></footer>

<script>
const S={tab:'free',module:'news',items:[],taken:[],feeds:[],stats:{},pipeline:{},allDays:false,sort:'temp',goodEx:[],badEx:[],reviews:[],metacritic:[]};
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ago(t){if(!t)return'—';const d=Math.floor((Date.now()-new Date(t))/1000);if(d<60)return'teraz';if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d'}
function fmtD(t){if(!t)return'—';return new Date(t).toLocaleString('pl-PL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
function fmtT(t){if(!t)return'';return new Date(t).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})}
function dayLbl(t){if(!t)return'—';const d=new Date(t),n=new Date(),y=new Date(n);y.setDate(n.getDate()-1);if(d.toDateString()===n.toDateString())return'Dzisiaj';if(d.toDateString()===y.toDateString())return'Wczoraj';return d.toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long'})}
function dayK(t){if(!t)return'x';const d=new Date(t);return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate()}
function dayAge(t){if(!t)return 99;return Math.floor((Date.now()-new Date(t))/86400000)}
function dom(u){try{return new URL(u).hostname.replace('www.','')}catch{return''}}
function showErr(m){document.getElementById('errMsg').textContent=m;document.getElementById('errEl').classList.add('show');setTimeout(()=>document.getElementById('errEl').classList.remove('show'),5000)}
function setH(el,h){const y=window.scrollY;el.innerHTML=h;window.scrollTo({top:y,behavior:'instant'})}
function tColor(t){return t>=8?'#ee0000':t>=6?'#f97316':t>=4?'#e5a000':'#94a3b8'}

function arcSvg(t){
  const v=Math.min(10,Math.max(1,t||5)),c=tColor(v);
  const fill=(v/10*62.8).toFixed(1);
  return '<svg width="56" height="36" viewBox="0 0 56 36"><path d="M 6 32 A 22 22 0 0 1 50 32" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="4.5" stroke-linecap="round"/><path d="M 6 32 A 22 22 0 0 1 50 32" fill="none" stroke="'+c+'" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="'+fill+' 69"/><text x="28" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="'+c+'" font-family="Geist Mono,monospace">'+v+'</text></svg>';
}

function tick(){const n=new Date();document.getElementById('hTime').textContent=n.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('hDate').textContent=n.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric'})}
tick();setInterval(tick,1000);

async function load(){
  try{const[items,tk,fd,st,pi]=await Promise.all([fetch('/api/news').then(r=>r.json()),fetch('/api/news/taken').then(r=>r.json()),fetch('/api/feeds').then(r=>r.json()),fetch('/api/stats').then(r=>r.json()),fetch('/api/pipeline/status').then(r=>r.json())]);S.items=items;S.taken=tk;S.feeds=fd;S.stats=st;S.pipeline=pi;render()}catch{showErr('Błąd połączenia')}
}

function setStatus(r,f){const a=r||f;document.getElementById('sDot').className='bdot '+(a?'busy':'ok');document.getElementById('sTxt').textContent=r?'pipeline...':f?'filtrowanie...':'gotowy'}
function render(){
  document.getElementById('mFree').textContent=S.stats.free||0;
  document.getElementById('mRes').textContent=S.stats.reserved||0;

async function addTraining(type){
  const title=document.getElementById(type+'Title').value.trim();
  const reason=document.getElementById(type+'Reason').value.trim();
  if(!title||!reason)return;

  if(type==='good'){
    const temp=parseInt(document.getElementById('goodTemp').value)||7;
    S.goodEx.push({title,temperature:Math.min(10,Math.max(1,temp)),reason});
    await fetch('/api/settings/training_good',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:JSON.stringify(S.goodEx)})});
  }else{
    S.badEx.push({title,reason});
    await fetch('/api/settings/training_bad',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:JSON.stringify(S.badEx)})});
  }
  document.getElementById(type+'Title').value='';
  document.getElementById(type+'Reason').value='';
  if(type==='good')document.getElementById('goodTemp').value='7';
  renderTraining();
}

async function delTraining(type,idx){

    S.goodEx.splice(idx,1);
    await fetch('/api/settings/training_good',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:JSON.stringify(S.goodEx)})});
  }else{
    S.badEx.splice(idx,1);
    await fetch('/api/settings/training_bad',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:JSON.stringify(S.badEx)})});
  }
  renderTraining();
}

function newsCard(item){
  const t=Math.min(10,Math.max(1,item.temperature||5));
  const isRes=item.status==='reserved';
  const isProd=item.status==='produced';
  const isDis=item.status==='dismissed';
  const isSlack=item.status==='slack_taken';
  const hl=item.headline||item.cluster_label||item.summary||'';
  const sum=item.summary&&item.summary!==hl?item.summary:'';
  const hasImg=item.og_image;
  const pc=item.produce_count||0;
  const cardClass='card'+(isRes?' reserved':'')+(isProd?' produced':'')+(isDis?' dismissed':'')+(isSlack?' faded':'');

  return '<div class="'+cardClass+'">'+
    '<div class="card-img">'+(hasImg?'<img src="'+esc(item.og_image)+'" loading="lazy" onerror="this.parentNode.innerHTML=\'\'">':'')+
    '<div class="card-gauge">'+arcSvg(t)+'</div></div>'+
    '<div class="card-body">'+
    (isRes?'<div class="card-reserved-badge">zarezerwowany</div>':'')+
    (isProd?'<div class="card-produced-badge">w produkcji'+(pc>1?' ('+pc+'x)':'')+'</div>':'')+
    '<div class="card-hl"><a href="'+esc(item.url)+'" target="_blank" rel="noopener">'+esc(hl)+'</a></div>'+
    (sum?'<div class="card-sum">'+esc(sum)+'</div>':'')+
    '<div class="card-meta m"><span class="card-src">'+esc(dom(item.url))+'</span> · '+fmtD(item.published_at)+'</div>'+
    (isSlack?'<div class="card-slack">zajęte: '+esc(item.reserved_by||'')+'</div>':'')+
    (isDis||isSlack?'':'<div class="card-actions">'+
      '<button class="card-btn act-dismiss" onclick="doAction('+item.id+',\'dismiss\')">Odrzuć</button>'+
      '<button class="card-btn act-res" onclick="doAction('+item.id+',\'reserve\')"'+(isRes?' disabled':'')+'>Rezerwuję</button>'+
      '<button class="card-btn act-prod" onclick="doAction('+item.id+',\'produce\')">Produkcja'+(pc>0?' ('+pc+')':'')+'</button>'+
    '</div>')+
    '</div></div>';
}

function renderFree(){
  const el=document.getElementById('v-free');
  const items=S.items.filter(i=>i.status==='free'||i.status==='reserved'||i.status==='produced'||i.status==='dismissed');
  if(!items.length){setH(el,'<div class="empty">Brak wolnych newsów - kliknij "pobierz nowe"</div>');return}

  // Sort: dismissed always last, then by chosen sort
  const sortFn=S.sort==='temp'
    ?(a,b)=>(a.status==='dismissed')-(b.status==='dismissed')||(b.temperature||0)-(a.temperature||0)
    :(a,b)=>(a.status==='dismissed')-(b.status==='dismissed')||new Date(b.published_at)-new Date(a.published_at);

  const days={};
  for(const i of items){const k=dayK(i.published_at);if(!days[k])days[k]={label:dayLbl(i.published_at),age:dayAge(i.published_at),items:[]};days[k].items.push(i)}
  for(const d of Object.values(days))d.items.sort(sortFn);

  const de=Object.entries(days).sort((a,b)=>a[1].age-b[1].age);
  const vis=S.allDays?de:de.slice(0,3);
  const hid=de.length-3;

  let h='<div class="sort-bar"><span>Sortuj:</span>'+
    '<button class="sort-btn'+(S.sort==='temp'?' on':'')+'" onclick="setSort(\'temp\')">wg potencjału</button>'+
    '<button class="sort-btn'+(S.sort==='time'?' on':'')+'" onclick="setSort(\'time\')">wg czasu</button>'+
  '</div>';

  for(const[k,g] of vis){
    h+='<div class="day">'+esc(g.label)+'</div>';
    h+='<div class="grid">'+g.items.map(i=>newsCard(i)).join('')+'</div>';
  }
  if(!S.allDays&&hid>0)h+='<button class="more-btn" onclick="S.allDays=true;renderFree()">Pokaż starsze ('+hid+' dni)</button>';
  setH(el,h);
}

function renderTaken(){

async function createReview(){
  const title=document.getElementById('rvTitle').value.trim();
  if(!title){showErr('Podaj tytuł gry');return}
  const inputs=document.querySelectorAll('#rvLinks input');
  const links=[...inputs].map(i=>i.value.trim()).filter(Boolean);
  const notes=document.getElementById('rvNotes').value.trim();
  try{
    const r=await fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_title:title,links,notes})});

    document.getElementById('rvLinks').innerHTML='<div class="rv-link-row"><input class="rv-input" style="margin:0" placeholder="https://... (link do recenzji źródłowej)" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addRvLink()}"></div>';

function setTab(t){S.tab=t;S.allDays=false;['free','taken','rejected','kanal','feeds','settings'].forEach(x=>{document.getElementById('v-'+x).style.display=x===t?'':'none';document.getElementById('tab-'+x).classList.toggle('on',x===t)});document.getElementById('secT').textContent=tabN[t];if(t==='settings')renderSettings();else if(t==='taken')renderTaken();else if(t==='feeds')renderFeeds();else if(t==='kanal')loadKanal();else if(t==='rejected')loadRejected();else renderFree()}

setInterval(()=>{if(!S.pipeline.isRunning&&!S.pipeline.isRefiltering)load()},60000);
load();
</script>
